# Use postgres/example user/password credentials
services:
  chat_app_1:
    image: ghcr.io/widgrensit/chat_app:latest
    ports:
      - 8100:80
    depends_on: [ db ]
  chat_app_2:
    image: ghcr.io/widgrensit/chat_app:latest
    ports:
      - 8200:80
    depends_on: [ db ]
  chat_app_3:
    image: ghcr.io/widgrensit/chat_app:latest
    ports:
      - 8300:80
    depends_on: [ db ]
  ldf:
    image: ghcr.io/widgrensit/ldf:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8095:8095
  chatli:
    image: ghcr.io/widgrensit/chatli:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8090:8090
  # Seeds the sample users once chatli has created its tables on boot.
  # Schema comes from each app's kura migrations, not from sql init.
  seeder:
    image: postgres:17-alpine
    depends_on: [ chatli ]
    restart: on-failure
    environment:
      PGPASSWORD: root
    volumes:
      - ./seed:/seed
    command: >
      sh -c "until psql -h db -U postgres -d chatli -c 'SELECT 1 FROM chatli_user LIMIT 1' >/dev/null 2>&1;
      do echo 'waiting for chatli tables...'; sleep 2; done;
      psql -h db -U postgres -d chatli -f /seed/seed.sql"
  db:
    image: postgres:17-alpine
    command: -c 'max_connections=2000'
    environment:
      POSTGRES_PASSWORD: root
    ports:
      - 5555:5432
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
  adminer:
    image: adminer
    ports:
      - 8082:8080
